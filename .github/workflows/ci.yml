name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (gofmt + go vet)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make lint

  test-unit:
    name: test (unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make test

  test-integration:
    name: test (integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make test-integration

  test-chaos:
    name: test (chaos)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make test-chaos

  build:
    name: build (static binary)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make build
      - run: ./bin/supervisor --version
