name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (gofmt + go vet)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make lint

  test-unit:
    name: test (unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make test

  test-integration:
    name: test (integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make test-integration

  test-chaos:
    name: test (chaos)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make test-chaos

  build:
    name: build (static binary)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make build
      - run: ./bin/supervisor --version

  sonarcloud:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    steps:
      # fetch-depth 0 gives Sonar full git history so blame-based
      # new-code detection and authorship work correctly.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      # Regenerate test coverage for Sonar. Duplicates the `test (unit)`
      # job's work but keeps the data in this job's workspace so the
      # scanner can pick it up without cross-job artifact choreography.
      # Only the default build tag is covered; integration/chaos/
      # live_acceptance/experiment tags are separate suites and not
      # part of the coverage baseline.
      - name: Generate Go coverage
        working-directory: supervisor
        run: |
          make copy-migrations
          go test -coverprofile=coverage.out -covermode=atomic ./...
      # Pinned to the full commit SHA of v5.0.0 per SonarQube's own
      # githubactions:S7637 rule. The tag-form (`@v5.0.0`) would let a
      # compromised publisher silently retag to a malicious commit.
      # v5.0.0 is a thin redirect to SonarSource/sonarqube-scan-action@v5
      # and emits a deprecation warning; the scan itself still runs. If
      # SonarCloud's automatic analysis is enabled on this project, disable
      # it in the Sonar UI before relying on this CI job — the two analysis
      # modes are mutually exclusive.
      - uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
