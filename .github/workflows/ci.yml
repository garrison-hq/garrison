name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (gofmt + go vet)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make lint

  test-unit:
    name: test (unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make test
      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: supervisor/coverage.out
          if-no-files-found: error

  test-integration:
    name: test (integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make test-integration
      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: supervisor/int-coverage.out
          if-no-files-found: error

  test-chaos:
    name: test (chaos)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make test-chaos
      - name: Upload chaos coverage
        uses: actions/upload-artifact@v4
        with:
          name: chaos-coverage
          path: supervisor/chaos-coverage.out
          if-no-files-found: error

  build:
    name: build (static binary)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make build
      - run: ./bin/supervisor --version

  # --- M3 dashboard (TypeScript / Next.js) ---------------------------------
  dashboard-typecheck:
    name: dashboard (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      # SHA-pinned per githubactions:S7637; resolves to v2 today.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run typecheck

  dashboard-test-unit:
    name: dashboard (test + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      # SHA-pinned per githubactions:S7637; resolves to v2 today.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      # vitest globalSetup boots a Postgres testcontainer and applies
      # goose-managed supervisor migrations + Drizzle migrations.
      # The harness shells out to the goose CLI; install it from
      # source so the integration step runs the same migration
      # path as developer machines.
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - name: Install goose CLI
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.21.1
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run test:coverage
      - name: Upload dashboard coverage
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-coverage
          path: dashboard/coverage/lcov.info
          if-no-files-found: error

  dashboard-build:
    name: dashboard (production build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      # SHA-pinned per githubactions:S7637; resolves to v2 today.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --ignore-scripts
      # Build with placeholder DSNs — the lazy-init clients in
      # lib/db/{appClient,vaultRoClient}.ts no longer throw at
      # module-load time, so this just verifies next build succeeds
      # against the current schema + components.
      - run: bun run build
        env:
          DASHBOARD_APP_DSN: postgres://placeholder@localhost:5432/x
          DASHBOARD_RO_DSN: postgres://placeholder@localhost:5432/x
          BETTER_AUTH_SECRET: ci_placeholder_long_enough_xxxxxxxxxxxxxxxxx

  dashboard-test-integration:
    name: dashboard (Playwright integration)
    runs-on: ubuntu-latest
    # The Playwright suite boots three testcontainers (Postgres,
    # Redis, Infisical v0.159.22) plus the dashboard standalone
    # bundle, so it is the slowest dashboard job. Hard cap to
    # surface a hung container faster than the workflow default.
    timeout-minutes: 20
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      # Node 22 (LTS Jod) for Playwright's CLI loader. Playwright
      # ≥1.50 requires Node ≥18.19; we standardise on the same
      # Node major Bun's runtime targets (Bun runs the test code,
      # Node just hosts the Playwright loader).
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # SHA-pinned per githubactions:S7637; resolves to v2 today.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      # The harness shells out to the goose CLI and uses the
      # supervisor's go.mod to pin the version.
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - name: Install goose CLI
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.21.1
      - run: bun install --frozen-lockfile --ignore-scripts
      # Pre-pull Docker images so the per-test boot doesn't
      # contend with the registry. ~700 MB total; pulled in
      # parallel.
      - name: Pre-pull testcontainer images
        run: |
          docker pull postgres:17 &
          docker pull postgres:15-alpine &
          docker pull redis:7-alpine &
          docker pull infisical/infisical:v0.159.22 &
          docker pull minio/minio@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e &
          wait
      # `--with-deps` installs the Linux packages Chromium needs
      # (libnss, libgbm, fonts, …). Cheaper than running
      # `bunx playwright install-deps` separately.
      - name: Install Playwright Chromium
        # Pinned to the playwright version in dashboard/package.json
        # (1.59.1 — both the @playwright/test and playwright deps
        # are pinned exactly there) so Sonar's "exact version" rule
        # is satisfied and the install can't drift between CI runs
        # if a newer 1.x release lands in the registry.
        run: bunx playwright@1.59.1 install --with-deps chromium
      # CI runs only the chromium-1280 project; the 1024 and 768
      # viewports gate responsive specs locally during the M3
      # polish round but don't add coverage that the primary
      # viewport doesn't already pin. Re-run all three locally
      # before a release.
      - name: Run Playwright integration suite
        run: bunx playwright@1.59.1 test --project=chromium-1280
      # Path A — server-side V8 coverage. The Playwright harness
      # spawns the dashboard with NODE_V8_COVERAGE; this step
      # converts those profiles to lcov via v8-to-istanbul.
      # Runs after Playwright exits so the dashboard has flushed
      # its profiles via the SIGTERM handler. See
      # tests/integration/_server-coverage.ts.
      - name: Convert server-side V8 profiles to lcov
        run: bun run tests/integration/_server-coverage.ts
        if: always()
      # Browser-side V8 coverage (Path B) from monocart-coverage
      # -reports → consumed by the SonarCloud job below.
      - name: Upload integration coverage (browser)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-integration-coverage
          path: dashboard/coverage/integration/lcov.info
          if-no-files-found: warn
      - name: Upload integration coverage (server)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-integration-server-coverage
          path: dashboard/coverage/integration-server-report/lcov.info
          if-no-files-found: warn
      - name: Upload Playwright trace + report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            dashboard/test-results/
            dashboard/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  sonarcloud:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    # Needs all test suites that produce coverage. If any fails,
    # Sonar doesn't run — better than posting a stale coverage
    # number. dashboard-test-integration is included so the
    # browser-side V8 coverage (Path B, M4 retro) is read alongside
    # the supervisor + vitest lcov.
    needs: [test-unit, test-integration, test-chaos, dashboard-test-unit, dashboard-test-integration]
    steps:
      # fetch-depth 0 gives Sonar full git history so blame-based
      # new-code detection and authorship work correctly.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Download both coverage profiles produced by the test jobs. Sonar
      # reads them from supervisor/coverage.out and supervisor/
      # int-coverage.out per sonar-project.properties.
      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage
          path: supervisor
      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: integration-coverage
          path: supervisor
      - name: Download chaos coverage
        uses: actions/download-artifact@v4
        with:
          name: chaos-coverage
          path: supervisor
      - name: Download dashboard coverage
        uses: actions/download-artifact@v4
        with:
          name: dashboard-coverage
          path: dashboard/coverage
      # Browser-side V8 coverage (Path B — Playwright + monocart)
      # AND server-side V8 coverage (Path A — NODE_V8_COVERAGE +
      # v8-to-istanbul). Sonar reads sonar.javascript.lcov
      # .reportPaths as a comma-list → all three lcov files
      # contribute to the metric (unit + integration browser +
      # integration server).
      - name: Download dashboard integration coverage (browser)
        uses: actions/download-artifact@v4
        with:
          name: dashboard-integration-coverage
          path: dashboard/coverage/integration
      - name: Download dashboard integration coverage (server)
        uses: actions/download-artifact@v4
        with:
          name: dashboard-integration-server-coverage
          path: dashboard/coverage/integration-server-report
      # Pinned to the full commit SHA of v5.0.0 per SonarQube's own
      # githubactions:S7637 rule. The tag-form (`@v5.0.0`) would let a
      # compromised publisher silently retag to a malicious commit.
      # v5.0.0 is a thin redirect to SonarSource/sonarqube-scan-action@v5
      # and emits a deprecation warning; the scan itself still runs. If
      # SonarCloud's automatic analysis is enabled on this project, disable
      # it in the Sonar UI before relying on this CI job — the two analysis
      # modes are mutually exclusive.
      - uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
