name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (gofmt + go vet)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make lint

  test-unit:
    name: test (unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make test

  test-integration:
    name: test (integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make test-integration

  test-chaos:
    name: test (chaos)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make test-chaos

  build:
    name: build (static binary)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: supervisor/go.mod
          cache-dependency-path: supervisor/go.sum
      - run: make build
      - run: ./bin/supervisor --version

  sonarcloud:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    steps:
      # fetch-depth 0 gives Sonar full git history so blame-based
      # new-code detection and authorship work correctly.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # v5.0.0 is a thin redirect to SonarSource/sonarqube-scan-action@v5
      # and emits a deprecation warning; the scan itself still runs. If
      # SonarCloud's automatic analysis is enabled on this project, disable
      # it in the Sonar UI before relying on this CI job — the two analysis
      # modes are mutually exclusive.
      - uses: SonarSource/sonarcloud-github-action@v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
