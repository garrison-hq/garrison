# Garrison — SonarCloud / SonarQube analysis scope.
#
# CI-based analysis via .github/workflows/ci.yml (SonarCloud scan job)
# uses the projectKey + organization below. Values verified against
# https://sonarcloud.io/api/components/search?organization=garrison-hq
sonar.projectKey=garrison-hq_garrison
sonar.organization=garrison-hq

# --- Go coverage ------------------------------------------------------------
# The sonarcloud job in ci.yml downloads two coverage profiles produced
# by the upstream test jobs:
#   - supervisor/coverage.out      — default build tag (make test)
#   - supervisor/int-coverage.out  — integration tag (make test-integration)
# Sonar merges both in Go's native coverage format; comma-separated
# paths are the canonical way to combine multiple profiles.
sonar.go.coverage.reportPaths=supervisor/coverage.out,supervisor/int-coverage.out

# --- Files excluded from coverage calculation only -------------------------
# internal/store/ is sqlc-generated (`// Code generated by sqlc. DO NOT
# EDIT.` header on every .sql.go file plus db.go and models.go). These
# files are fully analyzable for bugs and hotspots — they just shouldn't
# count against coverage, since we don't hand-write tests for generated
# code. The non-generated store_integration_test.go + seed_test.go are
# already excluded from analysis entirely by sonar.exclusions above.
#
# M2.3 additions:
#   - tools/vaultlog/testdata/**: analyzer test-fixture Go files (fakevault,
#     positive, negative, override). These are input source for the
#     go/analysis framework — they are compiled by the analysis harness,
#     not by `go test`, so coverage is always 0%. Measuring them distorts
#     the new-code bar.
#   - internal/spawn/mockclaude/**: test-only binary that replays canned
#     NDJSON streams for integration tests. Never compiled into the
#     production supervisor; not subject to unit coverage.
#   - cmd/supervisor/main.go + tools/vaultlog/cmd/**: main() entry points.
#     Go tooling cannot instrument main packages for coverage in the standard
#     `go test` flow; these will always show 0%.
#   - internal/vault/testutil.go: integration-test infrastructure
#     (//go:build integration). It is compiled only with -tags=integration
#     and its coverage is driven by spike-stack tests that require an
#     Infisical testcontainer — those tests skip in CI when the spike stack
#     is not running. Excluding it from coverage calculation prevents a
#     large body of test scaffolding from dragging down the metric.
sonar.coverage.exclusions=\
  supervisor/internal/store/**,\
  supervisor/tools/vaultlog/testdata/**,\
  supervisor/internal/spawn/mockclaude/**,\
  supervisor/cmd/supervisor/main.go,\
  supervisor/tools/vaultlog/cmd/**,\
  supervisor/internal/vault/testutil.go

# --- Files excluded from all analysis ---------------------------------------
# Test files: every Go file ending in `_test.go`, plus the supervisor's
#   top-level experiment_*.go harness files (build-tag-gated, test-only
#   infrastructure not compiled into the production binary).
# experiment-results/: raw per-run supervisor logs, claude stream-json
#   captures, and the post-run matrix JSON. Gitignored but can appear on
#   the local tree when Sonar scans.
# bin/, cmd/supervisor/migrations/, .codegraph/: build + cache artefacts.
# entities.json, mempalace.yaml: MemPalace per-project state files.
sonar.exclusions=\
  **/*_test.go,\
  supervisor/experiment_*.go,\
  experiment-results/**,\
  supervisor/bin/**,\
  supervisor/cmd/supervisor/migrations/**,\
  .codegraph/**,\
  entities.json,\
  mempalace.yaml,\
  **/node_modules/**

# --- Duplication-detector (CPD) exclusions ----------------------------------
# Migrations are frozen point-in-time snapshots. By design each migration's
# `+goose Down` block re-embeds the prior migration's `+goose Up` seed
# content verbatim so rollback is self-contained and does not depend on
# sibling migrations' state (see e.g.
# migrations/20260424000006_m2_2_2_compliance_calibration.sql §"+goose Down"
# comment). Two role-specific agent.md seed blocks within one migration
# also share the Role / Work loop / Completion skeleton structure that the
# completion-protocol template dictates. Factoring either kind of
# "duplication" out would introduce cross-migration coupling that the
# migrations are specifically designed to avoid.
sonar.cpd.exclusions=\
  migrations/**,\
  supervisor/internal/vault/testutil.go

# --- PL/SQL analyzer disabled -----------------------------------------------
# Sonar's only SQL analyzer targets Oracle PL/SQL; Garrison's migrations are
# PostgreSQL (PL/pgSQL plus dollar-quoted seed blocks). With the analyzer
# enabled it (a) raises systematic false positives on Postgres-only syntax
# and (b) prints a "Data Dictionary is not configured" warning on every
# scan because rules S3641/S3921/S3618/S3651 require Oracle schema metadata
# we will never have.
#
# Setting sonar.lang.patterns.plsql to an empty value disassociates *.sql
# from the PL/SQL analyzer entirely, so it does not run against our files.
# The migrations are still tracked by git and reviewed in PRs; they just
# do not pass through Sonar's Oracle-flavoured analyzer.
sonar.lang.patterns.plsql=
