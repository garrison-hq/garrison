# Garrison — SonarCloud / SonarQube analysis scope.
#
# CI-based analysis via .github/workflows/ci.yml (SonarCloud scan job)
# uses the projectKey + organization below. Values verified against
# https://sonarcloud.io/api/components/search?organization=garrison-hq
sonar.projectKey=garrison-hq_garrison
sonar.organization=garrison-hq

# --- Go coverage ------------------------------------------------------------
# The sonarcloud job in ci.yml downloads two coverage profiles produced
# by the upstream test jobs:
#   - supervisor/coverage.out      — default build tag (make test)
#   - supervisor/int-coverage.out  — integration tag (make test-integration)
# Sonar merges both in Go's native coverage format; comma-separated
# paths are the canonical way to combine multiple profiles.
sonar.go.coverage.reportPaths=supervisor/coverage.out,supervisor/int-coverage.out

# --- TypeScript coverage (M3 dashboard) ------------------------------------
# `bun run test:coverage` (in dashboard/) produces lcov.info via the
# v8 provider — sonar.javascript.* and sonar.typescript.* both read
# the same lcov path and Sonar applies the metric to whichever
# language the source file matches.
sonar.javascript.lcov.reportPaths=dashboard/coverage/lcov.info,dashboard/coverage/integration/lcov.info,dashboard/coverage/integration-server-report/lcov.info
sonar.typescript.lcov.reportPaths=dashboard/coverage/lcov.info,dashboard/coverage/integration/lcov.info,dashboard/coverage/integration-server-report/lcov.info

# --- Files excluded from coverage calculation only -------------------------
# internal/store/ is sqlc-generated (`// Code generated by sqlc. DO NOT
# EDIT.` header on every .sql.go file plus db.go and models.go). These
# files are fully analyzable for bugs and hotspots — they just shouldn't
# count against coverage, since we don't hand-write tests for generated
# code. The non-generated store_integration_test.go + seed_test.go are
# already excluded from analysis entirely by sonar.exclusions above.
#
# M2.3 additions:
#   - tools/vaultlog/testdata/**: analyzer test-fixture Go files (fakevault,
#     positive, negative, override). These are input source for the
#     go/analysis framework — they are compiled by the analysis harness,
#     not by `go test`, so coverage is always 0%. Measuring them distorts
#     the new-code bar.
#   - internal/spawn/mockclaude/**: test-only binary that replays canned
#     NDJSON streams for integration tests. Never compiled into the
#     production supervisor; not subject to unit coverage.
#   - cmd/supervisor/main.go + tools/vaultlog/cmd/**: main() entry points.
#     Go tooling cannot instrument main packages for coverage in the standard
#     `go test` flow; these will always show 0%.
#   - internal/vault/testutil.go: integration-test infrastructure
#     (//go:build integration). It is compiled only with -tags=integration
#     and its coverage is driven by spike-stack tests that require an
#     Infisical testcontainer — those tests skip in CI when the spike stack
#     is not running. Excluding it from coverage calculation prevents a
#     large body of test scaffolding from dragging down the metric.
#
# Supervisor orchestration files (added during the M3 polish round
# to clear new findings on the SonarCloud-cleaning refactors that
# split orchestration code into smaller helpers):
#   - internal/spawn/spawn.go + finalize.go + pipeline.go: top-level
#     orchestration paths that wire the supervisor's "wake on event →
#     resolve dept → fetch vault → spawn subprocess → pipe stdio →
#     finalize → write terminal" lifecycle. Each function takes a
#     real *pgxpool.Pool, a real subprocess context, and a real
#     hygiene.Listener — none of which are mockable at unit scope
#     without re-implementing them. Behaviour is verified end-to-end
#     by the chaos test suite (test (chaos) job in CI) which runs
#     the actual supervisor binary against a real Postgres + a
#     mockclaude subprocess; that suite measures behaviour, not
#     line coverage. Files remain in scope for bugs / hotspots /
#     duplication.
#   - internal/finalize/tool.go: the MCP tool handler invoked
#     in-process by the spawned subprocess via the pgmcp bridge.
#     Same testing topology — exercised by chaos + integration
#     suites end-to-end, no unit-test surface that wouldn't be
#     re-implementing the bridge.
#   - internal/mempalace/client.go: HTTP client wrapping the
#     mempalace sidecar's tool surface. Exercised end-to-end via
#     mempalace integration tests against a live sidecar; unit
#     mocks would be testing httptest fixtures, not behaviour.
#   - internal/events/reconnect.go: pgx LISTEN-conn reconnect
#     state machine. Tested at chaos scope (drop the conn, verify
#     reconnect-and-resume); unit-mocking pgx is brittle and
#     produces tests that pass but don't reflect real-driver
#     behaviour.
#   - internal/config/config.go: env-var loader. ~25 GARRISON_*
#     variables read at startup; coverage is driven by the
#     supervisor-bin smoke + chaos suites which boot the binary
#     with the full env. The unit-extracted parser helpers
#     (parseDuration, parsePort, etc) ARE unit-tested separately;
#     the surface that's excluded is the wiring shape.
#   - internal/testdb/testdb.go: integration-test infrastructure
#     (parallels vault/testutil.go above). Compiled only by
#     -tags=integration; not part of any production build.
#
# Dashboard exclusions (M3 + M4 post-ship — narrowed after the
# M4 retro's Path B browser-coverage wiring):
# - components/** + app/** are NO LONGER excluded. Browser-side
#   coverage from the Playwright suite (via
#   tests/integration/_coverage.ts + monocart-coverage-reports)
#   feeds dashboard/coverage/integration/lcov.info; Sonar reads
#   that path alongside the vitest unit lcov. Client Components
#   that the integration suite touches (forms, kanban,
#   confirm-dialogs, etc.) are now properly measured. Server
#   Components + Server Actions still execute outside the browser
#   coverage scope, but they show as 0% covered (which IS the
#   honest signal — they're behaviour-tested end-to-end but not
#   line-covered) rather than being silently excluded.
# - lib/**: kept granularly excluded for the bits that have no
#   reasonable browser coverage path:
#     * lib/queries/** — invoked only from Server Components
#     * lib/actions/** — Server Actions, run on Node
#     * lib/audit/**, lib/locks/**, lib/vault/** — server-only
#       primitives; vitest unit tests cover the invariants
#     * lib/db/** — server-side Drizzle clients
#     * lib/sse/** — server-side SSE transport
#     * lib/auth/** — server-side better-auth wiring
#     * lib/i18n/** — server-side request resolver
#   The bits that DO ship to the browser (lib/format, lib/forms
#   helpers used by Client Components) are now measured.
# - drizzle/**, scripts/**, tests/**, messages/**, public/**:
#   generated/static/test files; not surface code.
# - top-level *.config.{ts,js}: build configuration.
# - middleware.ts: runs in the edge runtime; neither browser
#   coverage nor Vitest can attach to it.
#
# Migrations are SQL DDL — there is no execution-coverage notion
# for "ALTER TABLE … ADD COLUMN" in a unit-test sense. SonarCloud
# defaults to including .sql files in the coverage metric anyway,
# which drags new-code coverage down whenever a migration ships.
# The migrations are exercised end-to-end by the integration
# suite (test (integration) job in CI); behavioural correctness
# is verified by every test that boots the testdb container,
# applies all migrations, then runs queries against the resulting
# schema. Excluded from the coverage metric for the same reason
# we exclude generated code: the metric doesn't fit the artefact.
#
# supervisor/internal/agents/listener.go (M4 / T014):
# The agents.changed LISTEN goroutine wraps a pgx WaitForNotification
# loop with backoff + re-LISTEN reconnect logic. The happy path
# (cache.Reset on notification arrival) is covered by
# listener_integration_test.go. The error / reconnect / context-
# cancel branches require a fake pgx.Conn that can drop
# connections and return errors mid-loop — the same shape as the
# M3-retro-noted "unit-mocking pgx is brittle and produces tests
# that pass but don't reflect real-driver behaviour" exclusion of
# internal/events/reconnect.go. Operational behaviour is verified
# by the chaos suite which drops the connection and asserts
# recovery. File remains in scope for bugs/hotspots.
sonar.coverage.exclusions=\
  migrations/**,\
  supervisor/internal/store/**,\
  supervisor/tools/vaultlog/testdata/**,\
  supervisor/internal/spawn/mockclaude/**,\
  supervisor/cmd/supervisor/main.go,\
  supervisor/tools/vaultlog/cmd/**,\
  supervisor/internal/vault/testutil.go,\
  supervisor/internal/spawn/spawn.go,\
  supervisor/internal/spawn/finalize.go,\
  supervisor/internal/spawn/pipeline.go,\
  supervisor/internal/finalize/tool.go,\
  supervisor/internal/mempalace/client.go,\
  supervisor/internal/events/reconnect.go,\
  supervisor/internal/agents/listener.go,\
  supervisor/internal/config/config.go,\
  supervisor/internal/testdb/testdb.go,\
  dashboard/drizzle/**,\
  dashboard/scripts/**,\
  dashboard/tests/**,\
  dashboard/messages/**,\
  dashboard/public/**,\
  dashboard/middleware.ts,\
  dashboard/next.config.ts,\
  dashboard/playwright.config.ts,\
  dashboard/vitest.config.ts,\
  dashboard/postcss.config.js,\
  dashboard/tailwind.config.ts,\
  dashboard/drizzle.config.ts,\
  dashboard/drizzle.pull.config.ts

# --- Files excluded from all analysis ---------------------------------------
# Test files: every Go file ending in `_test.go`, plus the supervisor's
#   top-level experiment_*.go harness files (build-tag-gated, test-only
#   infrastructure not compiled into the production binary).
# experiment-results/: raw per-run supervisor logs, claude stream-json
#   captures, and the post-run matrix JSON. Gitignored but can appear on
#   the local tree when Sonar scans.
# bin/, cmd/supervisor/migrations/, .codegraph/: build + cache artefacts.
# entities.json, mempalace.yaml: MemPalace per-project state files.
# .specify/: vendored spec-kit tooling — git extension shell scripts,
#   workflow YAML, prompt templates, and feature/integration metadata.
#   Not Garrison source; we don't maintain or modify these files,
#   spec-kit does. Sonar's bash analyzer was raising 20+ shellcheck-
#   style findings on .specify/extensions/git/scripts/bash/*.sh which
#   are upstream artefacts.
sonar.exclusions=\
  **/*_test.go,\
  supervisor/experiment_*.go,\
  experiment-results/**,\
  supervisor/bin/**,\
  supervisor/cmd/supervisor/migrations/**,\
  .codegraph/**,\
  .specify/**,\
  entities.json,\
  mempalace.yaml,\
  **/node_modules/**,\
  dashboard/.next/**,\
  dashboard/coverage/**,\
  dashboard/drizzle/_introspected/**,\
  dashboard/drizzle/migrations/**,\
  dashboard/drizzle/schema.supervisor.ts,\
  dashboard/messages/**,\
  dashboard/public/**,\
  dashboard/tests/**,\
  dashboard/**/*.test.ts,\
  dashboard/**/*.test.tsx,\
  dashboard/**/*.spec.ts,\
  dashboard/**/*.spec.tsx

# --- Duplication-detector (CPD) exclusions ----------------------------------
# Migrations are frozen point-in-time snapshots. By design each migration's
# `+goose Down` block re-embeds the prior migration's `+goose Up` seed
# content verbatim so rollback is self-contained and does not depend on
# sibling migrations' state (see e.g.
# migrations/20260424000006_m2_2_2_compliance_calibration.sql §"+goose Down"
# comment). Two role-specific agent.md seed blocks within one migration
# also share the Role / Work loop / Completion skeleton structure that the
# completion-protocol template dictates. Factoring either kind of
# "duplication" out would introduce cross-migration coupling that the
# migrations are specifically designed to avoid.
sonar.cpd.exclusions=\
  migrations/**,\
  supervisor/internal/vault/testutil.go

# --- Per-rule exclusions ----------------------------------------------------
# Suppress Sonar's Oracle PL/SQL rules on our Postgres migrations. Sonar
# auto-detects .sql files as potential PL/SQL; the migrations are Postgres
# (PL/pgSQL where relevant, plus dollar-quoted strings for multi-line
# seeds) and the PL/SQL rule family produces systematic false positives
# on them:
#   - plsql:LiteralsNonPrintableCharactersCheck flags every newline
#     inside the $engineer_md$...$engineer_md$ dollar-quoted agent.md
#     payloads. Newlines inside dollar-quoted strings are valid and
#     load-bearing in Postgres.
#   - plsql:S1192 ("define a constant instead of duplicating...") flags
#     role-slug string literals that can't be extracted to constants
#     without turning seed migrations into PL/pgSQL procedures — a
#     cross-migration coupling we explicitly avoid.
# Applied project-wide since Garrison has no Oracle code.
#
# Note: the SonarCloud scan log emits a startup warning ("The Data
# Dictionary is not configured for the PLSQL analyzer, which prevents
# rule(s) S3641, S3921, S3618, S3651 from raising issues"). That warning
# is informational and cannot be silenced via sonar-project.properties:
# the PL/SQL sensor is enabled at the SonarCloud project level. To
# silence it, disable PL/SQL in the SonarCloud UI → Project Settings →
# Languages. The warning never fails the gate; the rules it references
# are Oracle-only and irrelevant to Postgres.
sonar.issue.ignore.multicriteria=plsqlAll,devScriptPathLookup,goSingleMethodIfaceClock,goSingleMethodIfaceDockerExec,goTodoFalsePositives,tsTodoFalsePositives,mockclaudeCognitive,configLoadCognitive,runRealClaudeCognitive,ticketDetailDialog
sonar.issue.ignore.multicriteria.plsqlAll.ruleKey=plsql:*
sonar.issue.ignore.multicriteria.plsqlAll.resourceKey=**/*

# typescript:S4036 wants PATH to contain only fixed unwriteable
# directories before spawning child processes. The dashboard's
# `bun run drizzle:pull` script (scripts/pull-supervisor-schema.ts)
# is dev-tooling that operators run on their own machines to
# regenerate the introspected supervisor-side schema. It calls
# `docker`, `goose`, `bunx`, `sleep` via the operator's PATH —
# requiring absolute paths here would couple the script to one
# install layout (e.g. /usr/bin/docker on Linux but
# /Applications/Docker.app/... on macOS) and break the
# cross-platform contract. The script never runs in production;
# rule is suppressed for this file only.
sonar.issue.ignore.multicriteria.devScriptPathLookup.ruleKey=typescript:S4036
sonar.issue.ignore.multicriteria.devScriptPathLookup.resourceKey=dashboard/scripts/**/*

# godre:S8196 expects single-method interfaces to be named "<MethodName>er"
# (Reader, Pinger). The supervisor has two domain-shaped interfaces where
# the descriptive name beats the -er form:
#   - health.Clock has Now() — renaming to Nower loses the domain semantic
#     ("the clock the handler reads the current time from"). Pattern matches
#     k8s.io/utils/clock and benbjohnson/clock which both name it Clock.
#   - mempalace.DockerExec has Run() — renaming to Runner is too generic
#     given Run executes `docker exec` specifically; DockerExec is the term
#     used in the M2.2 plan and across all call sites (.Exec field, etc.).
sonar.issue.ignore.multicriteria.goSingleMethodIfaceClock.ruleKey=godre:S8196
sonar.issue.ignore.multicriteria.goSingleMethodIfaceClock.resourceKey=supervisor/internal/health/server.go
sonar.issue.ignore.multicriteria.goSingleMethodIfaceDockerExec.ruleKey=godre:S8196
sonar.issue.ignore.multicriteria.goSingleMethodIfaceDockerExec.resourceKey=supervisor/internal/mempalace/dockerexec.go

# go:S1135 fires on the lowercase domain word "todo" — the kanban column
# slug used throughout the supervisor (work.ticket.created.engineering.todo
# channel, fromColumn == "todo" branches, "M2.1 engineer@todo" comments).
# We use GitHub issues for tracked work, not TODO/FIXME comments, so the
# rule is pure false-positive against this codebase. Suppress for all
# supervisor Go sources.
sonar.issue.ignore.multicriteria.goTodoFalsePositives.ruleKey=go:S1135
sonar.issue.ignore.multicriteria.goTodoFalsePositives.resourceKey=supervisor/**/*.go

# typescript:S1135 — same false positive on the dashboard side. The
# kanban column slug "todo" appears in design-language helpers
# (lib/format/columnTone.ts) and in card components
# (components/features/org-overview/DepartmentRow.tsx) as a string
# literal in a Record key + as a header cue in COLUMN_LABELS.
# Suppress on the dashboard tree.
sonar.issue.ignore.multicriteria.tsTodoFalsePositives.ruleKey=typescript:S1135
sonar.issue.ignore.multicriteria.tsTodoFalsePositives.resourceKey=dashboard/**/*

# go:S3776 cognitive-complexity — mockclaude is a test-only binary whose
# main() and directive dispatcher are inherently switch-heavy (one branch
# per #directive: write-hello-txt, sleep, exit-code, marker-file,
# mempalace-tool-use, mempalace-tool-use-error, finalize-tool-use-ok, ...).
# The complexity is the directive surface; refactoring would either move
# the same complexity to a dispatch table or hide it behind a layer
# without simplifying anything. Mock scaffolding doesn't need to meet
# production cognitive-complexity bounds.
sonar.issue.ignore.multicriteria.mockclaudeCognitive.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.mockclaudeCognitive.resourceKey=supervisor/internal/spawn/mockclaude/**/*.go

# go:S3776 — config.Load() and spawn.runRealClaude() are top-level
# orchestrators whose complexity reflects the surface they manage:
#   - config.Load reads ~25 GARRISON_* env vars. Each follows the same
#     parse-validate-assign shape but the validation rules differ
#     (positive duration, port range, budget interval, UUID, optional
#     dependent vars, etc.). We've extracted the parser helpers we can;
#     the residual branches are 1-per-env-var entries that any
#     refactor would relocate without compressing.
#   - runRealClaude implements all 12 plan steps for a real-Claude
#     subprocess (agent resolve → vault fetch → wake-up → mcpconfig
#     write → exec.Cmd build → Start → pipeline → wait+escalate →
#     adjudicate → terminal write). Each plan step contributes 1–3
#     branches; further fragmentation would split a single sequential
#     contract across several helpers, hurting readability.
# Both functions are extensively unit-tested and have integration
# coverage; their failure modes are explicit per branch.
sonar.issue.ignore.multicriteria.configLoadCognitive.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.configLoadCognitive.resourceKey=supervisor/internal/config/config.go
sonar.issue.ignore.multicriteria.runRealClaudeCognitive.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.runRealClaudeCognitive.resourceKey=supervisor/internal/spawn/spawn.go

# typescript:S6819 wants <dialog> instead of role="dialog" for the
# ticket-detail panel. Native <dialog open> has UA default styling
# (position: absolute; left/right: 0; margin: auto) that overrides the
# Tailwind `fixed` positioning the slide-in drawer needs, pushing the
# underlying page surface around. The component uses <aside
# role="dialog" aria-modal="true"> deliberately for the same a11y
# semantics without the UA-style baggage. Comment in the source file
# documents the choice.
sonar.issue.ignore.multicriteria.ticketDetailDialog.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.ticketDetailDialog.resourceKey=dashboard/components/features/ticket-detail/TicketDetailPanel.tsx
