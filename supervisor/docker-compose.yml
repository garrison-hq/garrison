# Garrison M5.4 deployment topology.
#
# Eight services (M2.3 seven + M5.4 one):
#   postgres              — M1/M2.1 state store + pg_notify event bus
#   mempalace             — MemPalace 3.3.2 sidecar; idle host for per-exec work
#   docker-proxy          — linuxserver/socket-proxy with POST=1 EXEC=1
#                           CONTAINERS=1 only. Listens on TCP :2375 inside
#                           the compose network (NOT a unix-socket proxy —
#                           T001 finding F5). Supervisor reaches it by
#                           service-name DNS.
#   supervisor            — Garrison Go binary + claude 2.1.117 + docker-cli
#   infisical-postgres    — Postgres 15 backing store for Infisical (isolated
#                           from garrison-postgres; separate volume)
#   infisical-redis       — Redis 7 session/queue store for Infisical
#   infisical             — Infisical secrets manager; reachable as
#                           garrison-infisical:8080 on the compose network.
#                           NOT published to host (FR-422).
#   minio                 — MinIO single-node object storage (M5.4) hosting
#                           the CEO-editable Company.md object. Internal
#                           network only; no host port forwarding. Named
#                           volume garrison-minio-data preserves bucket
#                           state across restarts (no host bind mounts).
#
# Supervisor never mounts /var/run/docker.sock directly. All docker API
# access flows through the filtered proxy. Residual security envelope
# documented in docs/security/vault-threat-model.md § "M2.2 deployment
# assumptions (socket-proxy)".

services:
  postgres:
    image: postgres:17
    container_name: garrison-postgres
    environment:
      POSTGRES_DB: garrison
      POSTGRES_USER: supervisor
      POSTGRES_PASSWORD: ${GARRISON_POSTGRES_PASSWORD:?GARRISON_POSTGRES_PASSWORD required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supervisor -d garrison"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  mempalace:
    build:
      context: .
      dockerfile: Dockerfile.mempalace
    image: garrison/mempalace:m2-2
    container_name: garrison-mempalace
    volumes:
      - mempalace-palace:/palace
    restart: unless-stopped

  # linuxserver/socket-proxy: HAProxy-based docker-API filter.
  # POST=1      — allow POST endpoints (exec needs this)
  # EXEC=1      — allow /containers/*/exec + /exec/*/start
  # CONTAINERS=1— allow /containers/*/json (inspect; docker exec's preflight)
  # EVERY OTHER FLAG DEFAULTS TO 0 (DENY):
  #   IMAGES=0, VOLUMES=0, NETWORKS=0, BUILD=0, SWARM=0, CONFIGS=0,
  #   DISTRIBUTION=0, NODES=0, PLUGINS=0, SERVICES=0, SESSION=0,
  #   SYSTEM=0, TASKS=0, ALLOW_START=0, ALLOW_STOP=0, ALLOW_RESTARTS=0,
  #   COMMIT=0, AUTH=0, PING=0, INFO=0, EVENTS=0, VERSION=0
  docker-proxy:
    # Pin by digest at deploy time. Keep :latest here only for local
    # compose-based dev; production deployment substitutes a digest.
    image: ghcr.io/linuxserver/socket-proxy:latest
    container_name: garrison-docker-proxy
    environment:
      POST: 1
      EXEC: 1
      CONTAINERS: 1
      # M5.1 — chat runtime needs POST /containers/create to spawn
      # ephemeral garrison-claude:m5 containers per chat message.
      CREATE: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Listens on TCP :2375 inside the container. Not published to host —
    # only reachable over the compose network via DNS.
    restart: unless-stopped

  # M2.3: Infisical backing Postgres (isolated from garrison-postgres).
  infisical-postgres:
    image: postgres:15-alpine
    container_name: garrison-infisical-postgres
    environment:
      POSTGRES_DB: infisical
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: ${GARRISON_INFISICAL_PG_PASSWORD:?GARRISON_INFISICAL_PG_PASSWORD required}
    volumes:
      - infisical-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # M2.3: Infisical backing Redis.
  infisical-redis:
    image: redis:7-alpine
    container_name: garrison-infisical-redis
    restart: unless-stopped

  # M5.4: MinIO single-node object storage. Hosts the CEO-editable
  # Company.md object at s3://garrison-company/<companyId>/company.md.
  # Internal-network only (no ports: block) — accessed via service-name
  # DNS as garrison-minio:9000 from the supervisor. Per spike §F1, the
  # image is pinned by digest at deploy time. Persistence on a Docker
  # named volume (garrison-minio-data) — no host bind mounts (operator
  # constraint per specs/_context/m5-4-context.md). Root credentials
  # are env-on-container only; supervisor uses a scoped service account
  # whose creds live in Infisical (see ops-checklist M5.4 section).
  minio:
    image: minio/minio@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    container_name: garrison-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    volumes:
      - garrison-minio-data:/data
    command: server /data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # M2.3: Infisical secrets manager. Internal network only (no ports: block).
  # Set GARRISON_INFISICAL_IMAGE env var to pin a specific digest:
  #   GARRISON_INFISICAL_IMAGE=infisical/infisical@sha256:<digest>
  # See docs/ops-checklist.md §"M2.3 — Infisical deployment" for the
  # recommended pinning procedure.
  infisical:
    image: ${GARRISON_INFISICAL_IMAGE:-infisical/infisical:latest}
    container_name: garrison-infisical
    depends_on:
      infisical-postgres:
        condition: service_started
      infisical-redis:
        condition: service_started
    environment:
      ENCRYPTION_KEY: ${GARRISON_INFISICAL_ENCRYPTION_KEY:?GARRISON_INFISICAL_ENCRYPTION_KEY required}
      AUTH_SECRET: ${GARRISON_INFISICAL_AUTH_SECRET:?GARRISON_INFISICAL_AUTH_SECRET required}
      DB_CONNECTION_URI: postgres://infisical:${GARRISON_INFISICAL_PG_PASSWORD}@infisical-postgres:5432/infisical
      REDIS_URL: redis://infisical-redis:6379
      SITE_URL: http://garrison-infisical:8080
    restart: unless-stopped

  supervisor:
    build:
      context: .
      dockerfile: Dockerfile
    image: garrison/supervisor:m2-2
    container_name: garrison-supervisor
    depends_on:
      postgres:
        condition: service_healthy
      mempalace:
        condition: service_started
      docker-proxy:
        condition: service_started
      infisical:
        condition: service_started
      minio:
        condition: service_started
    environment:
      GARRISON_DATABASE_URL: postgres://supervisor:${GARRISON_POSTGRES_PASSWORD}@postgres:5432/garrison
      GARRISON_AGENT_RO_PASSWORD: ${GARRISON_AGENT_RO_PASSWORD:?GARRISON_AGENT_RO_PASSWORD required}
      GARRISON_AGENT_MEMPALACE_PASSWORD: ${GARRISON_AGENT_MEMPALACE_PASSWORD:?GARRISON_AGENT_MEMPALACE_PASSWORD required}
      GARRISON_MEMPALACE_CONTAINER: garrison-mempalace
      GARRISON_PALACE_PATH: /palace
      GARRISON_CLAUDE_BUDGET_USD: "0.10"
      # TCP-based proxy per T001 finding F5 (linuxserver/socket-proxy is
      # HAProxy on :2375, not a unix-socket proxy). No shared socket
      # volume; reachable by service-name DNS over the compose network.
      DOCKER_HOST: tcp://garrison-docker-proxy:2375
      # M2.3: Infisical vault credentials. See ops-checklist.md for setup.
      GARRISON_INFISICAL_ADDR: http://garrison-infisical:8080
      GARRISON_INFISICAL_CLIENT_ID: ${GARRISON_INFISICAL_CLIENT_ID:?GARRISON_INFISICAL_CLIENT_ID required}
      GARRISON_INFISICAL_CLIENT_SECRET: ${GARRISON_INFISICAL_CLIENT_SECRET:?GARRISON_INFISICAL_CLIENT_SECRET required}
      # M5.4: MinIO endpoint + bucket + scoped-cred Infisical paths.
      GARRISON_MINIO_ENDPOINT: garrison-minio:9000
      GARRISON_MINIO_BUCKET: garrison-company
      GARRISON_MINIO_USE_TLS: "false"
      GARRISON_MINIO_ACCESS_KEY_PATH: ${GARRISON_MINIO_ACCESS_KEY_PATH:?GARRISON_MINIO_ACCESS_KEY_PATH required}
      GARRISON_MINIO_SECRET_KEY_PATH: ${GARRISON_MINIO_SECRET_KEY_PATH:?GARRISON_MINIO_SECRET_KEY_PATH required}
      GARRISON_DASHBOARD_API_PORT: "8081"
    restart: unless-stopped

  # M3 — operator dashboard (Next.js 16 + React 19; standalone build).
  # Reads M2-arc data through two Postgres roles created by the T001
  # cross-boundary migration:
  #   garrison_dashboard_app  — operational reads + better-auth tables
  #   garrison_dashboard_ro   — vault sub-views ONLY
  # See docs/ops-checklist.md M3 section for role-password setup +
  # BETTER_AUTH_SECRET generation.
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: garrison-dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DASHBOARD_APP_DSN: ${DASHBOARD_APP_DSN:?DASHBOARD_APP_DSN required}
      DASHBOARD_RO_DSN: ${DASHBOARD_RO_DSN:?DASHBOARD_RO_DSN required}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      PORT: "3000"
      # M4 — Infisical credentials for the dashboard ML.
      # Optional: the dashboard boots without these and surfaces a
      # "configure vault" prompt; vault server actions throw
      # VaultError(Unavailable) at call time per
      # lib/vault/infisicalClient.ts.
      INFISICAL_DASHBOARD_ML_CLIENT_ID: ${INFISICAL_DASHBOARD_ML_CLIENT_ID:-}
      INFISICAL_DASHBOARD_ML_CLIENT_SECRET: ${INFISICAL_DASHBOARD_ML_CLIENT_SECRET:-}
      INFISICAL_DASHBOARD_PROJECT_ID: ${INFISICAL_DASHBOARD_PROJECT_ID:-}
      INFISICAL_DASHBOARD_ENVIRONMENT: ${INFISICAL_DASHBOARD_ENVIRONMENT:-prod}
      INFISICAL_SITE_URL: ${INFISICAL_SITE_URL:-http://garrison-infisical:8080}
      # M5.4 — Server-Side fetch target for /api/objstore/company-md +
      # /api/mempalace/recent-{writes,kg}. Supervisor's dashboardapi
      # binds port 8081 inside the compose network.
      DASHBOARD_SUPERVISOR_API_URL: ${DASHBOARD_SUPERVISOR_API_URL:-http://garrison-supervisor:8081}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres-data:
  mempalace-palace:
  infisical-postgres-data:
  garrison-minio-data:
