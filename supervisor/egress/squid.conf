# M7.1 egress allow-list (spec FR-009). The only route out of the
# garrison-agents network. Exactly one CONNECT destination.
http_port 3128
acl anthropic dstdomain api.anthropic.com
acl SSL_ports port 443
acl CONNECT method CONNECT
http_access deny CONNECT !SSL_ports
http_access allow CONNECT anthropic
http_access deny all
# Plan §10 said stdio:/dev/stdout, but squid drops privileges to the
# proxy user, which cannot reopen the container's root-owned stdout
# pipe — FATAL crash loop on the pinned ubuntu/squid image. The image's
# entrypoint tail -F's this file to stdout, so denials still surface in
# `docker logs garrison-egress-proxy` as intended (FR-009).
access_log /var/log/squid/access.log
cache deny all
